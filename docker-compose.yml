services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      php:
        condition: service_started
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./:/app:delegated
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      args:
        WWW_UID: ${WWW_UID:-1000}
        WWW_GID: ${WWW_GID:-1000}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app:delegated
      # Named volume — survives compose restarts, isolated per project.
      # Wiped only by `docker compose down -v` / `make nuke`.
      - composer_cache:/root/.composer/cache
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-storage-engine=InnoDB
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      # Persistent DB on a named volume — data survives `make down`/restarts,
      # isolated from the host filesystem. Removed only by `make nuke`.
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # Local mail catcher: PHP sends to mailpit:1025 (SMTP), you read mail in the
  # web UI. Nothing leaves the machine — dev only.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${FORWARD_MAILPIT_PORT:-8025}:8025"
    restart: unless-stopped

volumes:
  mysql_data:
  composer_cache:
